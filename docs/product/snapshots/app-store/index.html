<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Circleu App Store Screenshots</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1290px;
      height: 2796px;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: #cfe8ff;
    }

    body {
      display: grid;
      place-items: center;
    }

    .slide {
      position: relative;
      width: 1290px;
      height: 2796px;
      overflow: hidden;
      padding: 132px 96px 110px;
      color: #ffffff;
      isolation: isolate;
    }

    .slide::before,
    .slide::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.42;
      z-index: -1;
    }

    .slide::before {
      width: 620px;
      height: 620px;
      left: -180px;
      top: 580px;
      background: rgba(255, 255, 255, 0.42);
    }

    .slide::after {
      width: 720px;
      height: 720px;
      right: -230px;
      bottom: 220px;
      background: rgba(255, 255, 255, 0.28);
    }

    .blue {
      background:
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.30), transparent 30%),
        linear-gradient(155deg, #00a7f5 0%, #2e63f2 58%, #7b5cf6 100%);
    }

    .violet {
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.34), transparent 28%),
        linear-gradient(155deg, #b55cff 0%, #6255f5 55%, #1cb5e0 100%);
    }

    .mint {
      background:
        radial-gradient(circle at 85% 12%, rgba(255, 255, 255, 0.34), transparent 30%),
        linear-gradient(155deg, #11c5a6 0%, #23a6f0 58%, #3f65f3 100%);
    }

    .gold {
      background:
        radial-gradient(circle at 80% 18%, rgba(255, 255, 255, 0.38), transparent 28%),
        linear-gradient(155deg, #ffb32c 0%, #ff7f4f 48%, #4273f4 100%);
    }

    .rose {
      background:
        radial-gradient(circle at 20% 16%, rgba(255, 255, 255, 0.34), transparent 30%),
        linear-gradient(155deg, #ff7aa8 0%, #8f65ff 52%, #26c6da 100%);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 68px;
      color: rgba(255, 255, 255, 0.92);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      padding: 18px 26px 18px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.20);
      border: 2px solid rgba(255, 255, 255, 0.32);
      backdrop-filter: blur(18px);
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .mascot {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.94);
      color: #1264e5;
      font-size: 36px;
    }

    .beta {
      padding: 18px 28px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.28);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    h1 {
      width: 100%;
      margin: 0;
      font-size: 92px;
      line-height: 0.98;
      font-weight: 950;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 18px 52px rgba(16, 38, 96, 0.22);
    }

    .subtitle {
      max-width: 920px;
      margin: 34px 0 68px;
      font-size: 37px;
      line-height: 1.18;
      font-weight: 750;
      color: rgba(255, 255, 255, 0.86);
      letter-spacing: 0;
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 1780px;
    }

    .phone-shell {
      position: relative;
      width: 792px;
      height: 1724px;
      border-radius: 98px;
      padding: 22px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.58));
      box-shadow:
        0 58px 120px rgba(14, 34, 91, 0.34),
        inset 0 0 0 3px rgba(255, 255, 255, 0.82);
      transform: rotate(var(--tilt, -2deg));
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 78px;
      overflow: hidden;
      background: #d8ecff;
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.05);
    }

    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bubble {
      position: absolute;
      right: 42px;
      bottom: 84px;
      max-width: 360px;
      padding: 22px 28px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.90);
      color: #0d2b68;
      font-size: 30px;
      line-height: 1.08;
      font-weight: 900;
      box-shadow: 0 22px 48px rgba(14, 34, 91, 0.18);
    }

    .spark {
      position: absolute;
      left: 38px;
      bottom: 160px;
      width: 126px;
      height: 126px;
      display: grid;
      place-items: center;
      border-radius: 42px;
      background: rgba(255, 255, 255, 0.90);
      color: #1167e8;
      font-size: 64px;
      transform: rotate(-8deg);
      box-shadow: 0 22px 48px rgba(14, 34, 91, 0.16);
    }

    .footer {
      position: absolute;
      left: 96px;
      right: 96px;
      bottom: 72px;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.42);
    }

    .dot.active {
      width: 58px;
      border-radius: 999px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main id="app"></main>

  <script>
    const slides = [
      {
        className: "blue",
        title: "reflect in your own voice",
        subtitle: "Speak or type a quick check-in and start gently.",
        image: "../home.png",
        bubble: "voice or typed",
        spark: "🎙️",
        tilt: "-2deg"
      },
      {
        className: "violet",
        title: "turn check-ins into insight",
        subtitle: "Circleu notices emotion, expression, and one next step.",
        image: "../reflection.png",
        bubble: "AI reflection",
        spark: "✨",
        tilt: "2deg"
      },
      {
        className: "mint",
        title: "save your private journal",
        subtitle: "Keep reflections organized with notes, tags, and history.",
        image: "../journal.png",
        bubble: "private by default",
        spark: "📘",
        tilt: "-1.5deg"
      },
      {
        className: "gold",
        title: "practice one small next step",
        subtitle: "Use tips to rehearse clearer, kinder communication.",
        image: "../tips.png",
        bubble: "live coach",
        spark: "💬",
        tilt: "1.7deg"
      },
      {
        className: "rose",
        title: "share support with circles",
        subtitle: "Post selected insights, not raw recordings.",
        image: "../circle.png",
        bubble: "privacy-safe",
        spark: "👥",
        tilt: "-2.2deg"
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const index = Math.max(0, Math.min(slides.length - 1, Number(params.get("slide") || 0)));
    const slide = slides[index];

    document.getElementById("app").innerHTML = `
      <section class="slide ${slide.className}" style="--tilt:${slide.tilt}">
        <div class="brand-row">
          <div class="brand"><span class="mascot">🐧</span><span>Circleu</span></div>
          <div class="beta">TestFlight beta</div>
        </div>
        <h1>${slide.title}</h1>
        <p class="subtitle">${slide.subtitle}</p>
        <div class="stage">
          <div class="phone-shell">
            <div class="phone-screen">
              <img src="${slide.image}" alt="">
            </div>
            <div class="spark">${slide.spark}</div>
            <div class="bubble">${slide.bubble}</div>
          </div>
        </div>
        <div class="footer">
          ${slides.map((_, dotIndex) => `<span class="dot ${dotIndex === index ? "active" : ""}"></span>`).join("")}
        </div>
      </section>
    `;
  </script>
</body>
</html>
